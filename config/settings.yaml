# ============================================================
# RAG Stock Market System — Master Configuration
# ============================================================

app:
  name: "RAG Stock Market Intelligence"
  version: "1.0.0"
  log_level: "INFO"


# ---------- PostgreSQL ----------
database:
  host: "localhost"
  port: 5432
  name: "rag_stockmarket"
  user: "rag_user"
  password: "rag_password"
  schema_path: "./sql/postgres_pgvector_schema.sql"
  sslmode: "prefer"

# ---------- Vector Database ----------
vector_db:
  type: "postgres"
  table_name: "document_chunks"
  legacy_collection_name: "stock_news_chunks"
  index_type: "hnsw"       # "hnsw" | "ivfflat"
  distance_metric: "cosine" # "cosine" | "l2" | "ip"
  ivfflat_lists: 100
  hnsw_m: 16
  hnsw_ef_construction: 64


# ---------- Embedding ----------
embedding:
  model_name: "all-MiniLM-L6-v2"
  dimension: 384
  batch_size: 64
  device: "cpu"            # "cpu" | "cuda"

# ---------- Chunking ----------
chunking:
  chunk_size: 700
  chunk_overlap: 100
  separators:
    - "\n\n"
    - "\n"
    - ". "
    - " "

# ---------- Retrieval ----------
retrieval:
  vector_top_k: 20
  fts_top_k: 20
  final_top_k: 5
  vector_weight: 0.65
  fts_weight: 0.35
  similarity_threshold: 0.3
  min_keyword_score: 0.0

# ---------- Query Understanding ----------
query_understanding:
  language: "english"
  enable_synonym_expansion: true
  enable_ticker_normalization: true
  max_expansion_terms: 8

# ---------- Re-ranker ----------
reranker:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5
  batch_size: 32
  device: "cpu"

# ---------- LLM / Generator ----------
generator:
  provider: "gemini"
  model: "gemini-2.5-flash"
  fallback_models:
    - "gemini-2.5-flash-lite"
    - "gemini-2.0-flash"
  temperature: 0.1
  max_tokens: 1024
  retry_max_tokens: 2048
  thinking_budget: 0
  max_context_chars: 12000
  max_chunk_chars: 2500
  timeout_seconds: 30
  validate_model_on_startup: true
  system_prompt: |
    You are a financial news analyst. Answer questions using ONLY the
    provided context. Cite every claim with [Source N]. If the context
    is insufficient, say "I don't have enough information."

# ---------- Guardrails ----------
guardrails:
  allowed_topics:
    - "stock market"
    - "finance"
    - "investing"
    - "trading"
    - "economy"
    - "earnings"
    - "market analysis"
  max_query_length: 500
  block_pii: true

# ---------- LangGraph Agent ----------
agent:
  max_retries: 2
  relevance_threshold: 0.5

# ---------- Dataset ----------
dataset:
  name: "XA7-stock-market-news"
  source: "huggingface"
  hf_repo: "XA7/News-dataset-for-Stock-Market-news-classification"

  split: "train"

# ---------- Evaluation ----------
evaluation:
  metrics:
    - "faithfulness"
    - "answer_relevancy"
    - "context_precision"
    - "context_recall"
  sample_size: 50
